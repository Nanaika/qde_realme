name: qde_realme
description: ''
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  path: ^1.9.1
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Navigation
  go_router: ^14.2.0

  # Localization
  easy_localization: ^3.0.7

  # Network
  dio: ^5.4.1
  connectivity_plus: ^6.0.5

  # Functional Programming (Error Handling)
  dartz: ^0.10.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_core: ^4.9.0
  firebase_messaging: ^16.0.2

  cloud_firestore: ^6.0.2
  firebase_auth: ^6.0.2
  google_sign_in: ^7.1.1
  sign_in_with_apple: ^8.1.0


  crypto: ^3.0.3
  camera: ^0.12.0
  google_mlkit_text_recognition: ^0.15.0
  permission_handler: ^11.3.1

  firebase_remote_config: ^6.1.0


  file_picker: ^11.0.2
  excel: ^4.0.6

  # Refresh Control
  pull_to_refresh: ^2.0.0

  # Utils
  intl: 0.20.2
  showcaseview: ^4.0.1
  flutter_screenutil: ^5.9.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  injectable_generator: ^2.6.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/translations/uz.json
    - assets/translations/ru.json
    - assets/images/

